# Runs the same checks as `npm run verify` before Amplify Hosting deploys.
# If this fails, fix locally — do not merge to main.
name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Backend typecheck (Amplify Lambdas + schema)
        run: npm run typecheck:backend

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
