# Local dev workflow for Private Messenger.
#
# The React UI runs in Docker. The AWS backend (Cognito, AppSync, DynamoDB, S3)
# still deploys to your Amazon account — there is no practical full offline
# emulator for Amplify Gen 2. Use the optional `aws` profile to run a sandbox
# deploy from inside Docker with your host credentials mounted.
#
# Quick start (frontend only, backend already deployed):
#   docker compose up web
#
# Full loop (frontend + personal AWS sandbox):
#   docker compose --profile aws up
#
# Production-style static hosting (nginx serving dist/):
#   docker compose --profile prod up web-prod

services:
  web:
    build:
      context: .
      target: dev
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: 'true'

  sandbox:
    profiles: [aws]
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      # Mount host AWS credentials (Windows: set AWS_CREDENTIALS_DIR in .env)
      - ${AWS_CREDENTIALS_DIR:-${USERPROFILE}/.aws}:/root/.aws:ro
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-default}
      AWS_REGION: ${AWS_REGION:-us-east-2}
    command: npm run sandbox

  web-prod:
    profiles: [prod]
    build:
      context: .
      target: production
    ports:
      - '8080:80'

volumes:
  web_node_modules:
