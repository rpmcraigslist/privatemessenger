server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback for client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Runtime Amplify config can be swapped per environment without rebuilding.
  location = /amplify_outputs.json {
    add_header Cache-Control "no-store";
  }
}
