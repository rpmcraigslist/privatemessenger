version: 1
backend:
  phases:
    build:
      commands:
        - node -v && npm -v
        - npm install --cache .npm --prefer-offline --no-audit
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - node -v && npm -v
        - npm install --cache .npm --prefer-offline --no-audit
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
