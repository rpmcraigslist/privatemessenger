version: 1
backend:
  phases:
    build:
      commands:
        - node -v && npm -v
        - npm install --cache .npm --prefer-offline --no-audit
        - npm run typecheck
        - npm run typecheck:backend
        - npm run test
        - |
          if [ -z "$MESSENGER_FROM_EMAIL" ]; then
            echo "WARNING: MESSENGER_FROM_EMAIL is not set — email alerts will be skipped at runtime."
          else
            echo "MESSENGER_FROM_EMAIL is set for this deploy."
          fi
        - export AWS_REGION=us-east-2
        - export AWS_DEFAULT_REGION=us-east-2
        - echo "Deploying backend to AWS region $AWS_REGION (must match Amplify app + SES)"
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - test -f amplify_outputs.json && cp amplify_outputs.json public/amplify_outputs.json
        - node -e "const o=require('./amplify_outputs.json'); console.log('Backend outputs region:', o.auth?.aws_region)"
frontend:
  phases:
    preBuild:
      commands:
        - node -v && npm -v
        - npm install --cache .npm --prefer-offline --no-audit
        - npm run typecheck
        - npm run typecheck:backend
        - npm run test
    build:
      commands:
        - test -f amplify_outputs.json && cp amplify_outputs.json public/amplify_outputs.json
        - node -e "const o=require('./amplify_outputs.json'); console.log('outputs region:', o.auth?.aws_region, 'pool:', o.auth?.user_pool_id?.slice(0,12))"
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
